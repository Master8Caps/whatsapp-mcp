[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/app/docker-entrypoint.sh"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
# No healthcheck - the container manages its own lifecycle
# Port 3000: Python MCP SSE server (public domain)
# Port 8080: Go WhatsApp bridge (internal only)
